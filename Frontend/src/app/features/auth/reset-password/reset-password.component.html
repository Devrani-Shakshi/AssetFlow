<div class="reset-container">
  <mat-card class="reset-card">
    <mat-card-header>
      <mat-card-title>Reset Password</mat-card-title>
      <mat-card-subtitle>Choose a new secure password for your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>New Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" />
          <button mat-icon-button type="button" matSuffix (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          @if (resetForm.get('password')?.hasError('required') && resetForm.get('password')?.touched) {
            <mat-error>Password is required</mat-error>
          }
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width submit-btn" [disabled]="resetForm.invalid || isLoading()">
          @if (isLoading()) {
            <mat-spinner diameter="24" style="margin: 0 auto;"></mat-spinner>
          } @else {
            Reset Password
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
