<div class="page-container">
  <div class="page-header">
    <div class="header-titles">
      <h1>My Profile</h1>
      <p class="subtitle">View your user account information and settings</p>
    </div>
  </div>

  @if (currentUser) {
    <mat-card class="profile-card">
      <mat-card-content>
        <div class="profile-header">
          <div class="avatar-circle">
            {{ initials }}
          </div>
          <div class="user-main-info">
            <h2>{{ currentUser.firstName }} {{ currentUser.lastName }}</h2>
            <p class="role-badge">System Administrator</p>
          </div>
        </div>

        <div class="profile-details">
          <div class="detail-row">
            <span class="detail-label">First Name</span>
            <span class="detail-value">{{ currentUser.firstName }}</span>
          </div>

          <div class="detail-row">
            <span class="detail-label">Last Name</span>
            <span class="detail-value">{{ currentUser.lastName }}</span>
          </div>

          <div class="detail-row">
            <span class="detail-label">Email Address</span>
            <span class="detail-value">{{ currentUser.email }}</span>
          </div>
        </div>

        <div class="profile-actions">
          <button mat-flat-button color="warn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Sign Out
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
